<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>border-radius2</title>
  <style>
    *{margin: 0; padding: 0;}
    body{
      margin: 50px;
    }
    .box{
      width: 300px;
      height: 400px;
      border: 1px solid #000;
      border-radius: 50px;
      overflow: hidden;
    }
    .child{
      background-color:
       rgba(236, 224, 157, 0.5);
      height: 100%;
    }
    /* 
    자식의 크기가 부모크기 보다 넘쳐날때
    overflow 
    */
  </style>
</head>
<body>
  <div class="box">
    <div class="child">Lorem ipsum dolor sit amet consectetur, adipisicing elit. Fugiat alias ullam ea sequi libero officiis, eius corrupti veritatis fugit porro.    </div>
  </div>
</body>
</html>
