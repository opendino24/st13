  <h3>하이퍼링크 연습</h3>
  <!-- 
  url 형식
  프로토콜 ://도메인/경로/파일명.확장자
  프로토콜 ://도메인/경로/
   -->
  <!-- <a href="url">화면에 표시될 내용</a> -->
  <a href="http://www.naver.com" title="마우스 후버시 툴팁">네이버1</a>
  <!-- 
  target 속성 값
  _self 기본 생략시 적용된 속성값
  _blank 새탭에서 열기
   -->
  <a href="http://www.naver.com" 
  title="마우스 후버시 툴팁" 
  target="_blank">네이버2</a>
